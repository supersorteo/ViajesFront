<article
  class="card"
  (click)="onCardClick()"
  (keydown.enter)="onCardClick()"
  tabindex="0"
  [attr.aria-label]="'Ver detalles de ' + destino().nombre"
  role="button"
>
  <div class="card-image" [style.background-image]="'url(' + destino().imagenUrl + ')'"></div>
  <div class="price-oval" [attr.aria-label]="'Precio: $' + destino().precio">
    ${{ destino().precio | number }}
  </div>
  <div class="card-content">
    <div class="travel-date" aria-label="Fecha y hora de salida">
      <span class="date-day">{{ destino().fechaSalida | date: 'dd' }}</span>
      <span class="date-month">{{ destino().fechaSalida | date: 'MMM' }}</span>
      <span class="date-time">{{ destino().horaSalida }}</span>
    </div>
    <h3>{{ destino().nombre }}</h3>
    <p>{{ destino().descripcion }}</p>
    <button class="btn-outline" type="button">
      {{ destino().disponible ? 'Ver propuesta' : 'Próximamente' }}
    </button>
  </div>
</article>
