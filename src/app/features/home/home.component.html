<app-header subtitle="Tu próximo destino a un click" />

<main class="container">
  <h2 class="section-title">Destinos Destacados</h2>

  @if (cargando()) {
    <div class="loading" role="status" aria-live="polite">
      <div class="spinner" aria-hidden="true"></div>
      <p>Cargando destinos...</p>
    </div>
  }

  @if (error()) {
    <div class="error-message" role="alert">
      <p>{{ error() }}</p>
    </div>
  }

  @if (!cargando() && !error()) {
    <div class="cards-grid">
      @for (destino of destinos(); track destino.id) {
        <app-destino-card
          [destino]="destino"
          (seleccionar)="abrirPanel($event)"
        />
      }
    </div>
  }
</main>

<app-side-panel
  [destino]="destinoSeleccionado()"
  (cerrar)="cerrarPanel()"
/>

<button
  class="admin-access-btn"
  (click)="goToAdmin()"
  aria-label="Acceder al panel de administración"
  title="Panel de administración"
>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
    <circle cx="12" cy="8" r="3.5"/>
    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
    <circle cx="18.5" cy="6.5" r="3" fill="currentColor" stroke="none" opacity="0.2"/>
    <path d="M18.5 4.5v4M16.5 6.5h4" stroke-width="1.5"/>
  </svg>
</button>
